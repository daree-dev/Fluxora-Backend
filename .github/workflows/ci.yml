name: CI

on:
  push:
    branches: [main, develop, 'feature/**']
  pull_request:
    branches: [main, develop]

jobs:
  # ── 1. Build & Lint ────────────────────────────────────────────────────────
  build:
    name: Build and Lint
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Get pnpm store path
        id: pnpm-cache
        run: echo "store=$(pnpm store path)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.store }}
          key: pnpm-${{ runner.os }}-node${{ matrix.node-version }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-${{ runner.os }}-node${{ matrix.node-version }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check formatting and lint
        run: pnpm run lint

      - name: Build
        run: pnpm run build

  # ── 2. Contract-test coverage gate (≥ 95 %) ───────────────────────────────
  #
  # "Contract tests" covers all backend code that directly models or interacts
  # with the Soroban payment-stream contract:
  #   • src/services/streamEventService.ts  – Soroban RPC event ingestion
  #   • src/db/repositories/streamRepository.ts – on-chain state persistence
  #   • src/serialization/decimal.ts         – on-chain decimal-string handling
  #   • src/routes/streams.ts               – HTTP surface of the contract API
  #
  # The threshold is enforced by vitest's built-in coverage.thresholds option
  # (see vitest.config.ts).  The job fails fast if any metric < 95 %.
  # Only runs on Node 20 to keep CI fast; the build matrix already covers 18.
  coverage:
    name: Contract-test coverage gate (≥95%)
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Get pnpm store path
        id: pnpm-cache
        run: echo "store=$(pnpm store path)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.store }}
          key: pnpm-${{ runner.os }}-node20-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-${{ runner.os }}-node20-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests with coverage
        # vitest exits non-zero when any threshold is breached — CI fails here
        run: pnpm run test:coverage

      - name: Upload coverage report
        # Always upload so the report is available even on threshold failures
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14

      - name: Upload lcov to Codecov (optional)
        # Remove or replace with your own coverage service if not using Codecov.
        # Set CODECOV_TOKEN in repo secrets to enable.
        if: ${{ env.CODECOV_TOKEN != '' }}
        uses: codecov/codecov-action@v4
        with:
          files: coverage/lcov.info
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
