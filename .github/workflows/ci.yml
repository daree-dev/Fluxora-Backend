name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  ci:
    name: Typecheck · Test · Coverage
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Check for secrets in repo
        run: |
          if git ls-files | grep -E '^\.env$|^\.env\.'; then
            echo "ERROR: .env file is tracked by git — remove it immediately"
            exit 1
          fi
          echo "Secrets check passed"

      - name: Typecheck
        run: npm run build

      - name: Test
        run: npm test
        env:
          JWT_SECRET: ci-test-secret-at-least-32-chars-long
          NODE_ENV: test

      - name: Coverage check
        run: npm run test:coverage
        env:
          JWT_SECRET: ci-test-secret-at-least-32-chars-long
          NODE_ENV: test
